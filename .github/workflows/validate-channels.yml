name: Validate Channels

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run validator
        run: node validate/validate.mjs

      - name: Commit changes
        run: |
          git config user.name "Taranga+ Bot"
          git config user.email "bot@taranga-plus.dev"
          git add data/channels.json
          if ! git diff --cached --quiet; then
            git commit -m "chore: auto-validate channels $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          else
            echo "No changes to commit"
          fi
