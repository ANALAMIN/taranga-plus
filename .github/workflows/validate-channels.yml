name: Validate Channels (Hourly)

on:
  schedule:
    - cron: '*/15 * * * *'  # Every 15 minutes
  workflow_dispatch:       # Manual trigger

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Run channel validation
        run: node .github/scripts/validate-channels.mjs

      - name: Commit updated channels
        run: |
          git config user.name "Taranga+ Bot"
          git config user.email "bot@taranga-plus.dev"
          git add data/channels.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-validate channels $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
